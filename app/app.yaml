# Databricks App Configuration for LeaseMiner
# Documentation: https://docs.databricks.com/en/dev-tools/databricks-apps/index.html
#
# When deployed via DAB (databricks bundle deploy), the config section in
# databricks.yml overrides these values with bundle variables and resource
# references. The values below are safe defaults for local development.

command:
  - "/bin/bash"
  - "-c"
  - "pip install -r requirements.txt && python backend/api.py"

env:
  - name: FLASK_ENV
    value: "production"
  - name: FLASK_DEBUG
    value: "0"
  - name: PORT
    value: "8080"
  - name: DATABRICKS_CATALOG
    value: "REPLACE_ME"
  - name: DATABRICKS_SCHEMA
    value: "lease_management"
  - name: DATABRICKS_VOLUME
    value: "raw_lease_docs"
  - name: DATABRICKS_WAREHOUSE_ID
    value: "REPLACE_ME"
  - name: INGEST_JOB_ID
    value: "REPLACE_ME"
  - name: PIPELINE_JOB_ID
    value: "REPLACE_ME"

resources:
  - name: sql-warehouse
    sql_warehouse:
      permission: CAN_USE
  - name: claude-endpoint
    serving_endpoint:
      name: databricks-claude-sonnet-4-5
      permission: CAN_QUERY
  - name: ingest-job
    job:
      id: "REPLACE_ME"
      permission: CAN_MANAGE_RUN
  - name: pipeline-job
    job:
      id: "REPLACE_ME"
      permission: CAN_MANAGE_RUN
