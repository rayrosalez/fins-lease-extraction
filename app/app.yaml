# Databricks App Configuration for LeaseMiner
# Documentation: https://docs.databricks.com/en/dev-tools/databricks-apps/index.html
#
# NOTE: Placeholders (__VALUE__) are replaced by setup.sh during deployment.
# Do not manually edit the deployed version — re-run setup.sh instead.

command:
  - "/bin/bash"
  - "-c"
  - "pip install -r requirements.txt && python backend/api.py"

# Environment variables for the application
env:
  - name: FLASK_ENV
    value: "production"
  - name: FLASK_DEBUG
    value: "0"
  - name: PORT
    value: "8080"
  - name: DATABRICKS_CATALOG
    value: "__DATABRICKS_CATALOG__"
  - name: DATABRICKS_SCHEMA
    value: "__DATABRICKS_SCHEMA__"
  - name: DATABRICKS_VOLUME
    value: "__DATABRICKS_VOLUME__"
  - name: DATABRICKS_WAREHOUSE_ID
    value: "__DATABRICKS_WAREHOUSE_ID__"
  - name: INGEST_JOB_ID
    value: "__INGEST_JOB_ID__"
  - name: PIPELINE_JOB_ID
    value: "__PIPELINE_JOB_ID__"

# Resources that the app needs access to
resources:
  - name: sql-warehouse
    sql_warehouse:
      permission: CAN_USE
  - name: claude-endpoint
    serving_endpoint:
      name: __SERVING_ENDPOINT__
      permission: CAN_QUERY
  - name: ingest-job
    job:
      id: "__INGEST_JOB_ID__"
      permission: CAN_MANAGE_RUN
  - name: pipeline-job
    job:
      id: "__PIPELINE_JOB_ID__"
      permission: CAN_MANAGE_RUN
